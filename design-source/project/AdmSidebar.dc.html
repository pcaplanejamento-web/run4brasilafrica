<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<div style="background:#2b2b2b; color:#ddd; padding:28px 0; width:240px; min-height:100%; display:flex; flex-direction:column; font-family:'IBM Plex Sans',sans-serif;">
  <a href="ADM Dashboard.dc.html" style="text-decoration:none; padding:0 24px 24px; font-size:15px; font-weight:700; color:#fff; border-bottom:1px solid #444; margin-bottom:16px; display:block;">R4BA · Admin</a>
  <sc-for list="{{ items }}" as="n" hint-placeholder-count="9">
    <a href="{{ n.href }}" style="text-decoration:none; padding:13px 24px; font-size:14px; display:flex; align-items:center; gap:10px; background:{{ n.bg }}; border-left:3px solid {{ n.border }}; color:{{ n.color }};">
      <span style="width:16px; height:16px; border:1px solid #888; border-radius:3px; flex:none;"></span>
      <span>{{ n.label }}</span>
    </a>
  </sc-for>
  <div style="margin-top:auto; padding:20px 24px 0; border-top:1px solid #444;">
    <a href="ADM Login.dc.html" style="color:#999; font-size:13px; text-decoration:none;">Sair</a>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;active&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;dashboard&quot;, &quot;tsType&quot;: &quot;string&quot;}}">

class Component extends DCLogic {
  renderVals() {
    const active = this.props.active ?? "dashboard";
    const raw = [
      { key: "dashboard", label: "Dashboard", href: "ADM Dashboard.dc.html" },
      { key: "banner", label: "Banner / Hero", href: "ADM Banner.dc.html" },
      { key: "galeria", label: "Galeria", href: "ADM Galeria.dc.html" },
      { key: "conteudo", label: "Textos do site", href: "ADM Conteudo.dc.html" },
      { key: "strava", label: "Percurso (Strava)", href: "ADM Strava.dc.html" },
      { key: "patrocinadores", label: "Patrocinadores", href: "ADM Patrocinadores.dc.html" },
      { key: "links", label: "Links & inscrição", href: "ADM Links.dc.html" },
      { key: "usuarios", label: "Usuários", href: "ADM Usuarios.dc.html" },
      { key: "edicoes", label: "Edições", href: "ADM Edicoes.dc.html" },
      { key: "log", label: "Log de alterações", href: "ADM Log.dc.html" },
    ];
    const items = raw.map(n => ({
      ...n,
      bg: n.key === active ? "#3d3d3d" : "transparent",
      border: n.key === active ? "#c96f43" : "transparent",
      color: n.key === active ? "#fff" : "#bbb",
    }));
    return { items };
  }
}

</script>
</body>
</html>
