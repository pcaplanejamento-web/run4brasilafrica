<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</helmet>

<div style="display:flex; min-height:100vh; background:#f4f4f2; font-family:'IBM Plex Sans',sans-serif; color:#333;">
  <dc-import name="AdmSidebar" active="usuarios" hint-size="240px,100%" style="flex:none;"></dc-import>

  <div style="flex:1; padding:36px 44px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:28px;">
      <div style="font-size:22px; font-weight:700;">Usuários administrativos</div>
      <div style="background:oklch(0.55 0.16 35); color:#fff; padding:11px 22px; border-radius:6px; font-size:14px; font-weight:700;">+ Convidar usuário</div>
    </div>

    <div style="background:#fff; border:1px solid #e2e2dc; border-radius:8px; overflow:hidden;">
      <div style="display:grid; grid-template-columns:1.4fr 1fr 1fr 120px; padding:12px 20px; font-size:12px; color:#888; font-weight:700; border-bottom:1px solid #eee;">
        <div>NOME</div><div>PERMISSÃO</div><div>ÚLTIMO ACESSO</div><div>AÇÕES</div>
      </div>
      <sc-for list="{{ users }}" as="u" hint-placeholder-count="4">
        <div style="display:grid; grid-template-columns:1.4fr 1fr 1fr 120px; padding:14px 20px; align-items:center; border-bottom:1px solid #f1f1ef; font-size:13px;">
          <div>
            <div style="font-weight:600;">{{ u.name }}</div>
            <div style="color:#999; font-size:12px;">{{ u.email }}</div>
          </div>
          <div>{{ u.role }}</div>
          <div style="color:#777;">{{ u.lastAccess }}</div>
          <div style="display:flex; gap:8px;">
            <span style="font-size:12px; border:1px solid #ccc; padding:5px 10px; background:#fff; border-radius:4px;">Editar</span>
          </div>
        </div>
      </sc-for>
    </div>

    <div style="margin-top:24px; font-size:13px; color:#888;">Níveis de acesso: <strong>Administrador geral</strong> (controle total) e <strong>Editor de conteúdo</strong> (textos, galeria e banner).</div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>

class Component extends DCLogic {
  renderVals() {
    const users = [
      { name: "Fernanda Souza", email: "fernanda@run4brasilafrica.com", role: "Administrador geral", lastAccess: "Hoje, 14:32" },
      { name: "Bruno Alves", email: "bruno@run4brasilafrica.com", role: "Editor de conteúdo", lastAccess: "Ontem, 09:10" },
      { name: "Equipe Comunicação", email: "comunicacao@run4brasilafrica.com", role: "Editor de conteúdo", lastAccess: "28/06, 16:20" },
      { name: "Rafael Lima", email: "rafael@run4brasilafrica.com", role: "Administrador geral", lastAccess: "25/06, 11:45" },
    ];
    return { users };
  }
}

</script>
</body>
</html>
